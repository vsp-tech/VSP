<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/assets/css/vsp-theme.css">
<title>Victory Square Partners — Shared Resources</title>
<style>
  .directory-list { list-style: none; padding: 0; margin: 24px 0; }
  .directory-list li {
    background: var(--vsp-card-bg);
    border: 1px solid var(--vsp-card-border);
    border-radius: var(--vsp-radius-sm);
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .directory-list li:hover { border-color: var(--vsp-accent); }
  .directory-list a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    color: var(--vsp-text);
    text-decoration: none;
    font-size: 14px;
  }
  .directory-list a:hover { color: var(--vsp-text-bright); }
  .file-icon { color: var(--vsp-text-dim); font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
  .file-type {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    color: var(--vsp-text-dim);
    background: var(--vsp-navy-mid);
  }
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--vsp-text-dim);
    font-size: 14px;
  }
</style>
</head>
<body>

<header class="vsp-hero">
  <div class="vsp-container">
    <img src="/assets/images/vsp-logo.svg" alt="Victory Square Partners" class="vsp-logo">
    <h1>Shared Resources</h1>
    <p class="vsp-subtitle">Reports, proposals, and documents for prospects, clients, and teammates.</p>
  </div>
</header>

<main>
  <section class="vsp-section">
    <div class="vsp-container">
      <span class="vsp-section-label">Documents</span>
      <h2>Available Files</h2>
      <div class="empty-state vsp-mt-3">
        <p>No documents published yet.</p>
        <p class="vsp-mt-1">Drop HTML or PDF files into <code class="vsp-mono">public/</code> and push to deploy.</p>
      </div>
    </div>
  </section>
</main>

<footer class="vsp-footer">
  <div class="vsp-container">
    <p>Victory Square Partners &mdash; Confidential</p>
  </div>
</footer>

</body>
</html>
